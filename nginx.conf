# Опционально: используйте этот конфиг для nginx reverse proxy
# Раскомментируйте секцию nginx в docker-compose.yml и используйте этот файл

upstream casosino {
  server casosino:3000;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 10M;

  # Redirect HTTP to HTTPS в production
  # return 301 https://$server_name$request_uri;

  location / {
    proxy_pass http://casosino;
    proxy_http_version 1.1;
    
    # Важные headers для Websocket и streaming
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeout настройки
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Буферизация
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
  }

  # Health check endpoint
  location /health {
    access_log off;
    proxy_pass http://casosino/;
  }
}

